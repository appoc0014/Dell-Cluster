apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: ingress-monitor
  namespace: monitoring
spec:
  ingressClassName: traefik
  rules:
    - host: monitor.x4.com
      http:
        paths:
          - backend:
              service:
                name: kube-prometheus-stack-grafana
                port:
                  number: 80
            path: /
            pathType: Prefix
