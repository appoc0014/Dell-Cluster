apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: singlepod
  namespace: flux-system
spec:
  interval: 10m
  targetNamespace: singlepod
  install:
    createNamespace: true
  chart:
    spec:
      chart: ../../../Helm/singlepod/
      sourceRef:
        kind: GitRepository
        name: flux-system
        namespace: flux-system
      interval: 1m
  install:
    createNamespace: true
  values:
    replicaCount: 1
