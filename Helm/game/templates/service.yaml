apiVersion: v1
kind: Service
metadata:
  name: postgres
  namespace: {{ .Values.namespace }}
spec:
  selector:
    app: postgres
  ports:
    - name: pg
      protocol: TCP
      port: {{ .Values.port_postgres }}
      targetPort: {{ .Values.port_postgres }}
  type: ClusterIP

---

apiVersion: v1
kind: Service
metadata:
  name: {{ .Values.appname }}
  namespace: {{ .Values.namespace }}
spec:
  type: NodePort
  selector:
    app: {{ .Values.appname }}
  ports:
    - name: http
      protocol: TCP
      port: {{ .Values.port }}
      targetPort: {{ .Values.app_port }}
      nodePort: {{ .Values.nodeport  }}
        #  type: ClusterIP

---

